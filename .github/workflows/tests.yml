name: Tests

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install plugin (with PennyLane main + ionq-core)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[test]"
          uv pip install --upgrade git+https://github.com/PennyLaneAI/pennylane.git#egg=pennylane

      - name: Run unit tests
        run: uv run pytest tests --cov=pennylane_ionq --cov-report=term-missing --cov-report=xml --tb=native
        env:
          IONQ_API_KEY: ${{ secrets.IONQ_API_KEY }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install plugin (with PennyLane main)
        run: |
          uv venv --python 3.11
          uv pip install -e ".[test]"
          uv pip install --upgrade git+https://github.com/PennyLaneAI/pennylane.git#egg=pennylane

      - name: Run pl-device-test against ionq.simulator
        env:
          IONQ_API_KEY: ${{ secrets.IONQ_API_KEY }}
        run: |
          uv run pl-device-test --device=ionq.simulator --tb=short --skip-ops --shots=10000
