name: Upload

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test the wheel
        run: |
          uv venv --python 3.11
          uv pip install dist/*.whl pytest pytest-cov pytest-mock respx
          uv pip install --upgrade git+https://github.com/PennyLaneAI/pennylane.git#egg=pennylane
          uv run python -c "import pennylane_ionq; print(pennylane_ionq.__version__)"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pennylane-ionq
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
