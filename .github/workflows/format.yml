name: Format

on:
  pull_request:
  push:
    branches: [master]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Run ruff (lint)
        run: uvx ruff check pennylane_ionq tests

      - name: Run ruff (format check)
        run: uvx ruff format --check pennylane_ionq tests
